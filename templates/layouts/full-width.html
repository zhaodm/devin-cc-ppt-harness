<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>页面标题</title>
  <link rel="stylesheet" href="../shared/styles.css">
  <style>
    .slide-body {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
    }
    .card {
      padding: 36px 40px;
    }
    .card-title { font-size: 20px; }
    .card-conclusion { font-size: 16px; }
    .card-details { font-size: 14px; }
    .card-details li { margin-bottom: 8px; }
    .full-width-image {
      width: 100%;
      max-height: 360px;
      object-fit: contain;
      border-radius: var(--border-radius);
      margin-bottom: 16px;
    }
    .full-width-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .full-width-table th,
    .full-width-table td {
      padding: 10px 16px;
      text-align: left;
      border-bottom: 1px solid rgba(44, 36, 24, 0.1);
    }
    .full-width-table th {
      font-weight: 600;
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="slide-header">
      <h1>主标题</h1>
    </div>
    <div class="slide-keypoint">核心结论金句</div>
    <div class="slide-body">
      <div class="card">
        <div class="card-title">内容标题</div>
        <div class="card-conclusion">核心结论</div>
        <ul class="card-details">
          <li>逻辑细节 1</li>
          <li>逻辑细节 2</li>
          <li>逻辑细节 3</li>
          <li>数据证据</li>
        </ul>
      </div>
    </div>
    <div class="slide-nav-hint">← → 翻页 | Esc 返回目录</div>
    <div class="slide-footer">1 / N</div>
  </div>
  <script src="../shared/nav.js"></script>
  <script src="../shared/mermaid-init.js"></script>
</body>
</html>
