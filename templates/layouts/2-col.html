<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>页面标题</title>
  <link rel="stylesheet" href="../shared/styles.css">
  <style>
    .slide-body { grid-template-columns: repeat(2, 1fr); }
    .card { padding: 32px 28px; }
    .card-title { font-size: 18px; }
    .card-conclusion { font-size: 15px; }
    .card-details { font-size: 14px; }
  </style>
</head>
<body>
  <div class="slide">
    <div class="slide-header">
      <h1>主标题</h1>
    </div>
    <div class="slide-keypoint">核心结论金句</div>
    <div class="slide-body">
      <div class="card">
        <div class="card-title">分块标题 1</div>
        <div class="card-conclusion">核心结论</div>
        <ul class="card-details">
          <li>逻辑细节 1</li>
          <li>逻辑细节 2</li>
          <li>数据证据</li>
        </ul>
      </div>
      <div class="card">
        <div class="card-title">分块标题 2</div>
        <div class="card-conclusion">核心结论</div>
        <ul class="card-details">
          <li>逻辑细节 1</li>
          <li>逻辑细节 2</li>
          <li>数据证据</li>
        </ul>
      </div>
    </div>
    <div class="slide-nav-hint">← → 翻页 | Esc 返回目录</div>
    <div class="slide-footer">1 / N</div>
  </div>
  <script src="../shared/nav.js"></script>
  <script src="../shared/mermaid-init.js"></script>
</body>
</html>
