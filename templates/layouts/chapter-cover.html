<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>章节标题</title>
  <link rel="stylesheet" href="../shared/styles.css">
  <style>
    .slide {
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    .chapter-number {
      font-size: 72px;
      font-weight: 800;
      color: var(--accent);
      opacity: 0.3;
      margin-bottom: 16px;
    }
    .slide-header {
      margin-bottom: 24px;
    }
    .slide-header h1 {
      font-size: 48px;
      font-weight: 700;
    }
    .chapter-subtitle {
      font-size: 20px;
      color: var(--text-secondary);
      font-weight: 400;
      line-height: 1.6;
      max-width: 640px;
    }
    .chapter-divider {
      width: 80px;
      height: 3px;
      background: var(--accent);
      margin: 24px auto;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="chapter-number">01</div>
    <div class="slide-header">
      <h1>章节标题</h1>
    </div>
    <div class="chapter-divider"></div>
    <div class="chapter-subtitle">
      章节副标题或简要描述
    </div>
    <div class="slide-nav-hint">← → 翻页 | Esc 返回目录</div>
    <div class="slide-footer">1 / N</div>
  </div>
  <script src="../shared/nav.js"></script>
</body>
</html>
