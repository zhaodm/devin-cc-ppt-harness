<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>页面标题</title>
  <link rel="stylesheet" href="../shared/styles.css">
  <style>
    .slide-body {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr;
    }
    .panel {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .panel-text {
      padding: 24px;
    }
    .panel-text h2 {
      font-size: 22px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 16px;
    }
    .panel-text p {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.8;
      margin-bottom: 12px;
    }
    .panel-text .highlight {
      color: var(--accent);
      font-weight: 500;
    }
    .panel-visual {
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--bg-card);
      backdrop-filter: var(--backdrop-blur);
      -webkit-backdrop-filter: var(--backdrop-blur);
      border-radius: var(--border-radius);
      box-shadow: var(--shadow);
      padding: 24px;
    }
    .panel-visual img {
      max-width: 100%;
      max-height: 100%;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="slide-header">
      <h1>主标题</h1>
    </div>
    <div class="slide-keypoint">核心结论金句</div>
    <div class="slide-body">
      <div class="panel panel-text">
        <h2>文字区标题</h2>
        <p>详细说明段落，包含 <span class="highlight">重点内容高亮</span>。</p>
        <p>补充说明和数据支撑。</p>
      </div>
      <div class="panel panel-visual">
        <!-- 图片或 Mermaid 图表 -->
        <div class="mermaid">
graph TD
    A[开始] --> B[步骤1]
    B --> C[步骤2]
    C --> D[结束]
        </div>
      </div>
    </div>
    <div class="slide-nav-hint">← → 翻页 | Esc 返回目录</div>
    <div class="slide-footer">1 / N</div>
  </div>
  <script src="../shared/nav.js"></script>
  <script src="../shared/mermaid-init.js"></script>
</body>
</html>
