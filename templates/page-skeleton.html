<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>页面标题</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .slide-body { grid-template-columns: repeat(3, 1fr); }
  </style>
</head>
<body>
  <div class="slide">
    <!-- DE 自由设计页面结构，以下仅为参考示例，不强制使用三段式 -->
    <!-- 可选：英雄大图、左右分栏、时间线、仪表盘、对比表格、金句页等 -->
    <div class="slide-header">
      <h1>主标题</h1>
    </div>
    <div class="slide-keypoint">核心结论金句放在这里</div>
    <!-- 主体区域：DE 可根据内容自由选择呈现方式（卡片/图文/表格/图表等），以下仅为示例 -->
    <div class="slide-body">
      <div class="card">
        <div class="card-title">分块标题 1</div>
        <div class="card-conclusion">核心结论</div>
        <ul class="card-details">
          <li>逻辑细节 1</li>
          <li>逻辑细节 2</li>
          <li>数据证据</li>
        </ul>
      </div>
      <div class="card">
        <div class="card-title">分块标题 2</div>
        <div class="card-conclusion">核心结论</div>
        <ul class="card-details">
          <li>逻辑细节 1</li>
          <li>逻辑细节 2</li>
          <li>数据证据</li>
        </ul>
      </div>
      <div class="card">
        <div class="card-title">分块标题 3</div>
        <div class="card-conclusion">核心结论</div>
        <ul class="card-details">
          <li>逻辑细节 1</li>
          <li>逻辑细节 2</li>
          <li>数据证据</li>
        </ul>
      </div>
    </div>
    <div class="slide-nav-hint">← → 翻页 | Esc 返回目录</div>
    <div class="slide-footer">1 / N</div>
  </div>
  <script>
    window.__pptPages = [/* DE 在此填入所有页面文件名，如 'chapter-01.html', 'chapter-02.html' */];
  </script>
  <script src="shared/nav.js"></script>
  <script src="shared/mermaid-init.js"></script>
</body>
</html>
